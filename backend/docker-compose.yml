version: "3.9"

services:
  delivery-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      DATABASE_HOST: delivery-db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - app-network
    depends_on:
      delivery-db:
        condition: service_healthy

  delivery-db:
    image: postgres:17
    container_name: delivery-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    volumes:
      - delivery_db_data:/var/lib/postgresql/data

networks:
  app-network:
    driver: bridge

volumes:
  delivery_db_data: